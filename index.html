<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Viajes 🍋</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>¿Qué mapa quieres ver?</h1>
        <div class="menu-buttons">
            <button onclick="initMap('ar')">🇦🇷 Argentina</button>
            <button onclick="initMap('tucuman')">🍋 Tucumán</button>
        </div>
    </div>

    <div id="map-container" class="hidden">
        <nav class="top-bar">
            <button class="btn-nav" onclick="backToMenu()">⬅ Volver</button>
            <div class="legend">
                <span class="dot visited"></span> Visitado
                <span class="dot passed"></span> De pasada
                <span class="dot neutral"></span> Sin visitar
            </div>
            <button class="btn-nav" onclick="resetMap()">🔄 Reiniciar</button>
        </nav>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
