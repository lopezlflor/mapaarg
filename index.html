<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mapa de Viajes | Aesthetic</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="main-menu" class="overlay">
        <div class="menu-content">
            <h1>Mis Huellas</h1>
            <p>Selecciona un mapa para marcar tus aventuras</p>
            <div class="button-group">
                <button onclick="loadMap('argentina')">Argentina</button>
                <button onclick="loadMap('tucuman')">Tucumán</button>
            </div>
        </div>
    </div>

    <div id="toolbar" class="hidden">
        <button class="btn-icon" onclick="backToMenu()">🏠 Menú</button>
        <div class="legend">
            <span class="dot green"></span> Visitado
            <span class="dot yellow"></span> De pasada
            <span class="dot grey"></span> Sin visitar
        </div>
        <button class="btn-icon" onclick="resetMap()">🔄 Reiniciar</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
