<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa Viajero</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Tu CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🟢 MENÚ PRINCIPAL -->
<div id="mainMenu" class="screen active">
    <h1>Flor's checklist 🍋🇦🇷</h1>

    <button onclick="initMap('ar')">🇦🇷 Argentina</button>
    <button onclick="initMap('ar-tucuman')">🍋 Tucumán</button>
</div>

<!-- 🗺️ MAPA -->
<div id="mapScreen" class="screen">
    
    <div id="topBar">
        <button onclick="goHome()">← Volver</button>
        <button onclick="resetMap()">Reset</button>
    </div>

    <div id="map"></div>

</div>

<!-- 🧾 POPUP -->
<div id="popup" class="hidden">

    <div class="popup-header">
        <img id="popupFlag">
        <div>
            <h2 id="popupName"></h2>
            <p id="popupCap"></p>
        </div>
    </div>

    <div class="popup-actions">
        <button onclick="setStatus('visited')">✔ Visitado</button>
        <button onclick="setStatus('passed')">➜ Pasé</button>
        <button onclick="closePopup()">✖ Cerrar</button>
    </div>

    <hr>

    <h3>Agregar recuerdo</h3>

    <input type="file" id="photoInput">
    <input type="text" id="photoCity" placeholder="Ciudad">
    <input type="date" id="photoDate">

    <button onclick="savePhoto()">Guardar</button>

    <div id="photoGallery"></div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
